version: 2

builds:
  - id: iamspectre
    main: ./cmd/iamspectre/
    binary: iamspectre
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}
    goos:
      - linux
      - windows
    goarch:
      - amd64
      - arm64

  # WO-82@v4: Sign Darwin binaries before archiving so Gatekeeper sees the signed Mach-O.
  - id: iamspectre-darwin
    main: ./cmd/iamspectre/
    binary: iamspectre
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    hooks:
      post:
        - quill sign-and-notarize "{{ .Path }}" --dry-run={{ .IsSnapshot }} --ad-hoc={{ .IsSnapshot }}

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - repository:
      owner: ppiankov
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/ppiankov/iamspectre"
    description: "Cross-cloud IAM auditor — finds unused, over-permissioned, and stale identities"
    license: MIT
    install: |
      bin.install "iamspectre"
    test: |
      system "#{bin}/iamspectre", "version"

dockers_v2:
  - ids:
      - iamspectre
    dockerfile: Dockerfile.goreleaser
    images:
      - ghcr.io/ppiankov/iamspectre
    tags:
      - "{{ .Version }}"
      - latest
    platforms:
      - linux/amd64
      - linux/arm64
