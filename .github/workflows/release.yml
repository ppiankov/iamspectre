name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., v0.6.0)"
        required: true

permissions:
  contents: write
  packages: write

# WO-133@v2: keep one release run per tag across push and workflow_dispatch invocation.
concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  resolve:
    name: Resolve tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      ref: ${{ steps.tag.outputs.ref }}
    steps:
      - name: Resolve tag and ref
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "ref=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "ref=${{ github.ref }}" >> "$GITHUB_OUTPUT"
          fi

  test:
    name: Test before release
    needs: resolve
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.ref }}
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - run: make test

  validate-changelog:
    name: Validate changelog entry
    needs: resolve
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.ref }}
      - name: Require CHANGELOG entry for this release
        env:
          RELEASE_TAG: ${{ needs.resolve.outputs.tag }}
        run: |
          # WO-133@v2: fail before signing and publishing if changelog is missing for the release tag.
          VERSION="${RELEASE_TAG#v}"
          if [ -z "${RELEASE_TAG}" ] || [ "${VERSION}" = "${RELEASE_TAG}" ]; then
            echo "::error::Release tag must use the v<semver> format"
            exit 1
          fi
          if grep -q "^## \\[${VERSION}\\] - " CHANGELOG.md; then
            echo "CHANGELOG entry found for ${VERSION}"
          else
            echo "::error::CHANGELOG missing ## [${VERSION}] entry"
            exit 1
          fi

  release:
    name: Release
    needs: [test, validate-changelog, resolve]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.ref }}
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      # WO-82@v4: Pin both release tools so signing semantics cannot drift between tags.
      - name: Install release tools
        run: |
          go install github.com/anchore/quill/cmd/quill@v0.7.1
          go install github.com/goreleaser/goreleaser/v2@v2.13.3

      # WO-82@v4: Keep signing credentials confined to the fail-closed release step.
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          QUILL_SIGN_P12: ${{ secrets.QUILL_SIGN_P12 }}
          QUILL_SIGN_PASSWORD: ${{ secrets.QUILL_SIGN_PASSWORD }}
          QUILL_NOTARY_KEY: ${{ secrets.QUILL_NOTARY_KEY }}
          QUILL_NOTARY_KEY_ID: ${{ secrets.QUILL_NOTARY_KEY_ID }}
          QUILL_NOTARY_ISSUER: ${{ secrets.QUILL_NOTARY_ISSUER }}
        run: |
          required_secrets=(
            QUILL_SIGN_P12
            QUILL_SIGN_PASSWORD
            QUILL_NOTARY_KEY
            QUILL_NOTARY_KEY_ID
            QUILL_NOTARY_ISSUER
          )
          for secret_name in "${required_secrets[@]}"; do
            if [[ -z "${!secret_name:-}" ]]; then
              echo "::error::Required release credential ${secret_name} is not configured"
              exit 1
            fi
          done
          goreleaser release --clean

      # WO-96: GoReleaser's `brews` publisher is deprecated in favor of `homebrew_casks`,
      # but this repository's packaging policy requires a Formula, not a Cask, so the
      # tap update is a separate fail-closed step instead of a GoReleaser publisher.
      - name: Publish Homebrew formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [[ -z "${HOMEBREW_TAP_TOKEN:-}" ]]; then
            echo "::error::Required release credential HOMEBREW_TAP_TOKEN is not configured"
            exit 1
          fi
          go run ./cmd/publish-homebrew-formula --version "${{ needs.resolve.outputs.tag }}" --checksums dist/checksums.txt
